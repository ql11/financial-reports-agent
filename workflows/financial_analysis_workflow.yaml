# 财务分析工作流配置
name: "financial_analysis_workflow"
version: "1.0.0"
description: "完整的财报分析工作流，从PDF提取到报告生成"

# 工作流定义
workflow:
  name: "财报分析完整流程"
  version: "1.0.0"
  description: "处理PDF财报文件，提取数据，分析指标，评估风险，生成报告"

# 输入定义
inputs:
  - name: "pdf_file"
    type: "file"
    description: "PDF财报文件"
    required: true
    validation:
      format: "pdf"
      max_size: "50MB"
  
  - name: "company_name"
    type: "string"
    description: "公司名称"
    required: false
    default: "自动识别"
  
  - name: "report_year"
    type: "integer"
    description: "报告年度"
    required: false
    default: "自动识别"
  
  - name: "output_format"
    type: "string"
    description: "输出格式"
    required: false
    default: "markdown"
    options: ["markdown", "html", "pdf"]

# 输出定义
outputs:
  - name: "analysis_report"
    type: "file"
    description: "分析报告文件"
    format: "根据output_format参数"
  
  - name: "financial_indicators"
    type: "json"
    description: "财务指标数据"
  
  - name: "risk_assessment"
    type: "json"
    description: "风险评估结果"
  
  - name: "executive_summary"
    type: "text"
    description: "执行摘要"

# 步骤定义
steps:
  - id: "step_1"
    name: "PDF文件验证"
    agent: "system"
    action: "validate_input"
    inputs:
      - pdf_file
    outputs:
      - validation_result
    timeout: 30
  
  - id: "step_2"
    name: "数据提取"
    agent: "data_extraction_agent"
    action: "extract_financial_data"
    inputs:
      - pdf_file: "{{inputs.pdf_file}}"
      - extraction_mode: "full"
    outputs:
      - extracted_data
      - data_quality
    timeout: 120
    retry:
      max_attempts: 3
      delay: 10
  
  - id: "step_3"
    name: "数据分析"
    agent: "financial_analysis_agent"
    action: "analyze_financial_data"
    inputs:
      - financial_data: "{{steps.step_2.outputs.extracted_data}}"
      - company_info:
          name: "{{inputs.company_name}}"
          year: "{{inputs.report_year}}"
    outputs:
      - financial_indicators
      - trend_analysis
    timeout: 60
  
  - id: "step_4"
    name: "风险评估"
    agent: "risk_assessment_agent"
    action: "assess_risks"
    inputs:
      - financial_indicators: "{{steps.step_3.outputs.financial_indicators}}"
      - industry_benchmarks: "{{configs.industry_benchmarks}}"
      - risk_thresholds: "{{configs.risk_thresholds}}"
    outputs:
      - risk_assessment
      - risk_scores
      - recommendations
    timeout: 60
  
  - id: "step_5"
    name: "报告生成"
    agent: "report_generation_agent"
    action: "generate_report"
    inputs:
      - financial_data: "{{steps.step_2.outputs.extracted_data}}"
      - indicators: "{{steps.step_3.outputs.financial_indicators}}"
      - risk_analysis: "{{steps.step_4.outputs.risk_assessment}}"
      - trend_analysis: "{{steps.step_3.outputs.trend_analysis}}"
      - company_info:
          name: "{{inputs.company_name}}"
          year: "{{inputs.report_year}}"
      - output_format: "{{inputs.output_format}}"
    outputs:
      - analysis_report
      - executive_summary
      - visualizations
    timeout: 90
  
  - id: "step_6"
    name: "质量检查"
    agent: "system"
    action: "quality_check"
    inputs:
      - report: "{{steps.step_5.outputs.analysis_report}}"
      - indicators: "{{steps.step_3.outputs.financial_indicators}}"
      - risk_assessment: "{{steps.step_4.outputs.risk_assessment}}"
    outputs:
      - quality_score
      - validation_results
    timeout: 30

# 错误处理
error_handling:
  - condition: "data_quality < 0.7"
    action: "retry_step"
    step: "step_2"
    max_retries: 2
  
  - condition: "validation_failed"
    action: "notify"
    message: "数据验证失败，请检查输入文件"
    severity: "error"
  
  - condition: "timeout"
    action: "log_and_continue"
    message: "步骤超时，继续执行后续步骤"
    severity: "warning"

# 监控指标
metrics:
  - name: "total_processing_time"
    type: "duration"
    description: "总处理时间"
  
  - name: "data_quality_score"
    type: "score"
    description: "数据质量评分"
  
  - name: "risk_score"
    type: "score"
    description: "风险评分"
  
  - name: "report_quality"
    type: "score"
    description: "报告质量评分"

# 通知配置
notifications:
  - type: "completion"
    channels: ["log"]
    template: "分析完成：{{company_name}} {{report_year}}年度财报分析报告已生成"
  
  - type: "error"
    channels: ["log", "email"]
    template: "分析失败：{{error_message}}"
  
  - type: "warning"
    channels: ["log"]
    template: "警告：{{warning_message}}"

# 版本控制
version_control:
  enabled: true
  backup_reports: true
  max_versions: 10
  retention_days: 365
