# 财报分析系统主配置文件

# 文件夹配置
folders:
  source: ./source              # 源文件夹（PDF财报）
  repository: ./repository      # 仓库文件夹（Markdown文件）
  reports: ./reports            # 分析报告输出目录
  logs: ./logs                  # 日志文件目录

# 分析维度配置
analysis:
  dimensions:
    - profitability            # 盈利能力分析
    - solvency                  # 偿债能力分析
    - operation                 # 运营能力分析
    - growth                    # 成长能力分析
    - cashflow                  # 现金流分析
  
  # 是否启用趋势分析
  trend_analysis: true
  
  # 是否启用行业对比
  industry_comparison: true
  
  # 是否启用同行对比
  peer_comparison: false

# PDF处理配置
pdf:
  # PDF转换工具（pandoc）
  converter: pandoc

  # Pandoc可执行文件路径（如果不在PATH中，需要指定完整路径）
  pandoc_path: "C:/Program Files/pandoc/pandoc.exe"

  # Pandoc转换参数
  pandoc_options:
    # 输入格式
    from_format: pdf
    # 输出格式
    to_format: markdown
    # 是否提取图片
    extract_media: false
    # 图片提取目录（相对于repository文件夹）
    media_dir: media
    # 是否自动换行
    wrap: none
    # 标题风格（atx或setext）
    markdown_headings: atx

  # 是否保留原始Markdown文件
  keep_original_md: true

# 报告生成配置
report:
  # 报告格式（markdown, html）
  format: markdown
  
  # 是否包含执行摘要
  include_summary: true
  
  # 是否包含指标一览表
  include_indicators_table: true
  
  # 是否包含详细分析
  include_detailed_analysis: true
  
  # 是否包含风险提示
  include_risk_warnings: true
  
  # 是否包含综合评分
  include_score: true
  
  # 是否生成可视化图表
  generate_charts: false

# 性能配置
performance:
  # 批处理大小
  batch_size: 50
  
  # 单个文件处理超时时间（秒）
  timeout: 120
  
  # 并行处理工作进程数（0表示自动）
  workers: 0
  
  # 是否启用进度显示
  show_progress: true

# 日志配置
logging:
  # 日志级别（DEBUG, INFO, WARNING, ERROR, CRITICAL）
  level: INFO
  
  # 日志文件名
  filename: financial_analysis.log
  
  # 日志文件最大大小（MB）
  max_size: 10
  
  # 保留日志文件数量
  backup_count: 5
  
  # 是否输出到控制台
  console_output: true

# 数据验证配置
validation:
  # 是否启用数据验证
  enabled: true
  
  # 数据质量评分阈值（0-1）
  quality_threshold: 0.8
  
  # 是否允许部分数据缺失
  allow_partial_data: true

# 风险识别配置
risk:
  # 风险阈值配置文件路径
  thresholds_file: ./config/risk_thresholds.yaml
  
  # 是否启用风险预警
  enable_warnings: true
  
  # 风险等级划分标准
  levels:
    high: 3      # 高风险扣分
    medium: 2    # 中风险扣分
    low: 1       # 低风险扣分
