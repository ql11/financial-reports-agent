# 行业基准数据配置文件

# 行业分类及基准指标
industries:
  # 制造业
  manufacturing:
    name: "制造业"
    profitability:
      gross_margin: 0.25        # 毛利率基准
      net_margin: 0.08          # 净利率基准
      roe: 0.12                 # ROE基准
      roa: 0.06                 # ROA基准
    solvency:
      debt_ratio: 0.55          # 资产负债率基准
      current_ratio: 1.5        # 流动比率基准
      quick_ratio: 1.0          # 速动比率基准
    operation:
      inventory_turnover: 6.0   # 存货周转率基准
      receivable_turnover: 8.0  # 应收账款周转率基准
      total_asset_turnover: 0.8 # 总资产周转率基准
    growth:
      revenue_growth: 0.10      # 营收增长率基准
      profit_growth: 0.12       # 净利润增长率基准
  
  # 房地产业
  real_estate:
    name: "房地产业"
    profitability:
      gross_margin: 0.30
      net_margin: 0.10
      roe: 0.15
      roa: 0.05
    solvency:
      debt_ratio: 0.70
      current_ratio: 1.2
      quick_ratio: 0.6
    operation:
      inventory_turnover: 0.5
      receivable_turnover: 5.0
      total_asset_turnover: 0.3
    growth:
      revenue_growth: 0.05
      profit_growth: 0.08
  
  # 金融业
  finance:
    name: "金融业"
    profitability:
      gross_margin: 0.60
      net_margin: 0.25
      roe: 0.12
      roa: 0.01
    solvency:
      debt_ratio: 0.90
      current_ratio: 1.0
      quick_ratio: 1.0
    operation:
      inventory_turnover: 0.0
      receivable_turnover: 0.0
      total_asset_turnover: 0.05
    growth:
      revenue_growth: 0.08
      profit_growth: 0.10
  
  # 零售业
  retail:
    name: "零售业"
    profitability:
      gross_margin: 0.20
      net_margin: 0.05
      roe: 0.15
      roa: 0.08
    solvency:
      debt_ratio: 0.50
      current_ratio: 1.8
      quick_ratio: 0.8
    operation:
      inventory_turnover: 12.0
      receivable_turnover: 20.0
      total_asset_turnover: 2.0
    growth:
      revenue_growth: 0.12
      profit_growth: 0.15
  
  # 科技行业
  technology:
    name: "科技行业"
    profitability:
      gross_margin: 0.40
      net_margin: 0.15
      roe: 0.18
      roa: 0.10
    solvency:
      debt_ratio: 0.40
      current_ratio: 2.0
      quick_ratio: 1.5
    operation:
      inventory_turnover: 8.0
      receivable_turnover: 10.0
      total_asset_turnover: 1.0
    growth:
      revenue_growth: 0.20
      profit_growth: 0.25
  
  # 医药行业
  pharmaceutical:
    name: "医药行业"
    profitability:
      gross_margin: 0.50
      net_margin: 0.12
      roe: 0.14
      roa: 0.08
    solvency:
      debt_ratio: 0.45
      current_ratio: 1.8
      quick_ratio: 1.2
    operation:
      inventory_turnover: 4.0
      receivable_turnover: 6.0
      total_asset_turnover: 0.6
    growth:
      revenue_growth: 0.15
      profit_growth: 0.18
  
  # 能源行业
  energy:
    name: "能源行业"
    profitability:
      gross_margin: 0.35
      net_margin: 0.10
      roe: 0.10
      roa: 0.05
    solvency:
      debt_ratio: 0.60
      current_ratio: 1.2
      quick_ratio: 0.8
    operation:
      inventory_turnover: 8.0
      receivable_turnover: 10.0
      total_asset_turnover: 0.5
    growth:
      revenue_growth: 0.08
      profit_growth: 0.10
  
  # 汽车行业
  automotive:
    name: "汽车行业"
    profitability:
      gross_margin: 0.18
      net_margin: 0.06
      roe: 0.12
      roa: 0.05
    solvency:
      debt_ratio: 0.65
      current_ratio: 1.3
      quick_ratio: 0.9
    operation:
      inventory_turnover: 8.0
      receivable_turnover: 12.0
      total_asset_turnover: 0.7
    growth:
      revenue_growth: 0.10
      profit_growth: 0.12

# 默认行业（当无法识别行业时使用）
default:
  name: "综合行业"
  profitability:
    gross_margin: 0.25
    net_margin: 0.08
    roe: 0.12
    roa: 0.06
  solvency:
    debt_ratio: 0.55
    current_ratio: 1.5
    quick_ratio: 1.0
  operation:
    inventory_turnover: 6.0
    receivable_turnover: 8.0
    total_asset_turnover: 0.8
  growth:
    revenue_growth: 0.10
    profit_growth: 0.12

# 行业识别规则
industry_mapping:
  # 根据公司名称关键词识别行业
  keywords:
    manufacturing:
      - "制造"
      - "机械"
      - "设备"
      - "材料"
    real_estate:
      - "地产"
      - "房产"
      - "置业"
      - "建设"
    finance:
      - "银行"
      - "证券"
      - "保险"
      - "金融"
    retail:
      - "零售"
      - "百货"
      - "超市"
      - "商业"
    technology:
      - "科技"
      - "电子"
      - "软件"
      - "信息"
    pharmaceutical:
      - "医药"
      - "生物"
      - "制药"
      - "医疗"
    energy:
      - "能源"
      - "电力"
      - "石油"
      - "煤炭"
    automotive:
      - "汽车"
      - "车辆"
      - "交通"
