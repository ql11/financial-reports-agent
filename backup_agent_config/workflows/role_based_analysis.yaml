# 基于role.md的财报分析工作流
version: 2.0.0
name: "role_based_financial_analysis"
description: "基于role.md要求的完整财报分析工作流"

workflow:
  name: "基于role.md的财报分析"
  description: "按照role.md定义的分析维度和输出格式进行完整财报分析"
  
  steps:
    # 步骤1: 数据提取
    - step: "PDF财报数据提取"
      agent: "data_extraction_agent"
      description: "从PDF财报文件中提取结构化财务数据"
      inputs:
        - pdf_file: "输入PDF文件路径"
        - company_name: "公司名称（可选）"
        - report_year: "报告年度（可选）"
      outputs:
        - extracted_data: "提取的结构化财务数据"
        - raw_text: "原始文本数据"
        - tables: "提取的表格数据"
    
    # 步骤2: 核心财务指标计算
    - step: "核心财务指标计算"
      agent: "financial_analysis_agent"
      description: "计算盈利能力、偿债能力、运营能力、成长能力指标"
      inputs:
        - extracted_data: "从步骤1获取的财务数据"
      outputs:
        - profitability_indicators: "盈利能力指标"
        - solvency_indicators: "偿债能力指标"
        - operation_indicators: "运营能力指标"
        - growth_indicators: "成长能力指标"
    
    # 步骤3: 三大报表分析
    - step: "三大报表深度分析"
      agent: "financial_analysis_agent"
      description: "深入分析资产负债表、利润表、现金流量表"
      inputs:
        - extracted_data: "从步骤1获取的财务数据"
      outputs:
        - balance_sheet_analysis: "资产负债表分析"
        - income_statement_analysis: "利润表分析"
        - cash_flow_analysis: "现金流量表分析"
    
    # 步骤4: 趋势分析
    - step: "多年数据趋势分析"
      agent: "financial_analysis_agent"
      description: "进行多年数据趋势分析"
      inputs:
        - extracted_data: "从步骤1获取的财务数据"
        - historical_data: "历史财务数据（可选）"
      outputs:
        - trend_analysis: "趋势分析结果"
        - growth_trends: "增长趋势"
        - volatility_analysis: "波动性分析"
    
    # 步骤5: 行业对比
    - step: "行业对比分析"
      agent: "financial_analysis_agent"
      description: "与行业均值和同行公司对比"
      inputs:
        - indicators: "从步骤2获取的财务指标"
        - industry_data: "行业基准数据"
      outputs:
        - industry_comparison: "行业对比结果"
        - competitive_position: "竞争地位分析"
        - strengths_weaknesses: "优势劣势分析"
    
    # 步骤6: 风险识别
    - step: "财务风险识别"
      agent: "risk_assessment_agent"
      description: "识别财务风险信号、经营风险提示、潜在问题预警"
      inputs:
        - indicators: "从步骤2获取的财务指标"
        - analysis_results: "从步骤3-5获取的分析结果"
      outputs:
        - financial_risks: "财务风险信号"
        - operational_risks: "经营风险提示"
        - potential_problems: "潜在问题预警"
        - risk_scores: "风险评分"
    
    # 步骤7: 财报造假检测
    - step: "财报造假方法识别"
      agent: "risk_assessment_agent"
      description: "分析财报造假的方法和逻辑"
      inputs:
        - financial_data: "从步骤1获取的财务数据"
        - indicators: "从步骤2获取的财务指标"
        - analysis_results: "从步骤3-5获取的分析结果"
      outputs:
        - fraud_indicators: "造假指标"
        - fraud_methods: "造假方法识别"
        - fraud_logic: "造假逻辑分析"
        - fraud_score: "造假风险评分"
    
    # 步骤8: 报告生成
    - step: "生成分析报告"
      agent: "report_generation_agent"
      description: "按照role.md要求的格式生成分析报告"
      inputs:
        - executive_summary_inputs: "执行摘要所需数据"
        - key_indicators: "从步骤2获取的关键指标"
        - detailed_analysis: "从步骤3-7获取的详细分析"
        - risk_warnings: "从步骤6-7获取的风险提示"
      outputs:
        - executive_summary: "执行摘要（核心结论）"
        - key_indicators_table: "关键指标一览表"
        - detailed_analysis_report: "详细分析（按分析维度）"
        - risk_warnings_report: "风险提示"
        - comprehensive_score: "综合评分（1-10分）"
        - fraud_analysis_report: "财报造假分析"
        - investment_recommendations: "投资建议"
    
    # 步骤9: 报告整合
    - step: "最终报告整合"
      agent: "report_generation_agent"
      description: "整合所有分析结果生成最终报告"
      inputs:
        - all_analysis_results: "所有分析步骤的结果"
      outputs:
        - final_report: "最终分析报告"
        - report_format: "报告格式（markdown/html/pdf）"
        - visualizations: "可视化图表"
        - summary_dashboard: "摘要仪表板"

# 输入参数
inputs:
  pdf_file:
    type: "string"
    required: true
    description: "PDF财报文件路径"
  
  company_name:
    type: "string"
    required: false
    description: "公司名称"
  
  report_year:
    type: "integer"
    required: false
    description: "报告年度"
  
  output_format:
    type: "string"
    required: false
    default: "markdown"
    description: "输出报告格式"
    options: ["markdown", "html", "pdf"]
  
  analysis_depth:
    type: "string"
    required: false
    default: "comprehensive"
    description: "分析深度"
    options: ["basic", "standard", "comprehensive"]
  
  include_fraud_detection:
    type: "boolean"
    required: false
    default: true
    description: "是否包含财报造假检测"

# 输出参数
outputs:
  final_report:
    type: "file"
    description: "最终分析报告文件"
  
  executive_summary:
    type: "text"
    description: "执行摘要（核心结论）"
  
  key_indicators_table:
    type: "table"
    description: "关键指标一览表"
  
  detailed_analysis:
    type: "text"
    description: "详细分析（按分析维度）"
  
  risk_warnings:
    type: "list"
    description: "风险提示列表"
  
  comprehensive_score:
    type: "number"
    description: "综合评分（1-10分）"
  
  fraud_analysis:
    type: "text"
    description: "财报造假分析"
  
  investment_recommendations:
    type: "list"
    description: "投资建议列表"

# 错误处理
error_handling:
  retry_attempts: 3
  retry_delay: 5  # 秒
  fallback_strategies:
    - "跳过失败步骤继续执行"
    - "使用默认值替代缺失数据"
    - "生成部分报告并标记不完整"
  
  notifications:
    on_error: true
    on_warning: true
    on_completion: true

# 性能配置
performance:
  timeout_per_step: 300  # 每个步骤超时时间（秒）
  max_concurrent_steps: 3
  memory_limit_mb: 2048
  cpu_limit: 2

# 监控配置
monitoring:
  enabled: true
  metrics:
    - step_execution_time
    - step_success_rate
    - data_quality_score
    - analysis_completeness
  
  logging:
    level: "INFO"
    format: "json"
    output: "file"  # file, console, both