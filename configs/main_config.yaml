# 财报分析系统主配置
version: 1.0.0
system_name: "Financial Reports Analysis System"
description: "基于agent架构的财报分析系统"

# 系统设置
settings:
  language: "zh-CN"
  timezone: "Asia/Shanghai"
  log_level: "INFO"
  max_concurrent_tasks: 5
  cache_enabled: true
  cache_ttl: 3600  # 1小时

# 目录配置
directories:
  inputs: "./inputs"
  outputs: "./outputs"
  data: "./data"
  logs: "./logs"
  reports: "./reports"
  temp: "./temp"

# Agent配置
agents:
  financial_analysis:
    enabled: true
    config_file: "./agents/financial_analysis/agent.yaml"
    skills:
      - pdf_processing
      - data_analysis
      - risk_detection
      - report_writing
  
  data_extraction:
    enabled: true
    config_file: "./agents/data_extraction/agent.yaml"
    skills:
      - pdf_processing
  
  risk_assessment:
    enabled: true
    config_file: "./agents/risk_assessment/agent.yaml"
    skills:
      - risk_detection
      - data_analysis
  
  report_generation:
    enabled: true
    config_file: "./agents/report_generation/agent.yaml"
    skills:
      - report_writing
      - data_analysis

# 技能配置
skills:
  pdf_processing:
    enabled: true
    config_file: "./skills/pdf_processing/skill.yaml"
    dependencies:
      - pdfplumber>=0.10.3
      - camelot-py>=0.11.0
      - pandas>=2.0.0
  
  data_analysis:
    enabled: true
    config_file: "./skills/data_analysis/skill.yaml"
    dependencies:
      - pandas>=2.0.0
      - numpy>=1.24.0
      - scipy>=1.10.0
  
  risk_detection:
    enabled: true
    config_file: "./skills/risk_detection/skill.yaml"
    dependencies:
      - pandas>=2.0.0
      - numpy>=1.24.0
  
  report_writing:
    enabled: true
    config_file: "./skills/report_writing/skill.yaml"
    dependencies:
      - jinja2>=3.1.0
      - matplotlib>=3.7.0
      - plotly>=5.15.0

# 工作流配置
workflows:
  full_analysis:
    name: "完整财报分析"
    description: "完整的财报分析流程"
    steps:
      - step: "数据提取"
        agent: "data_extraction"
        inputs:
          - pdf_file
        outputs:
          - extracted_data
      
      - step: "数据分析"
        agent: "financial_analysis"
        inputs:
          - extracted_data
        outputs:
          - indicators
          - trend_analysis
      
      - step: "风险评估"
        agent: "risk_assessment"
        inputs:
          - indicators
        outputs:
          - risk_assessment
      
      - step: "报告生成"
        agent: "report_generation"
        inputs:
          - indicators
          - risk_assessment
          - trend_analysis
        outputs:
          - report
  
  quick_analysis:
    name: "快速分析"
    description: "快速财报分析流程"
    steps:
      - step: "数据提取和分析"
        agent: "financial_analysis"
        inputs:
          - pdf_file
        outputs:
          - indicators
          - risk_assessment
          - report

# 性能配置
performance:
  timeout_seconds: 300
  max_file_size_mb: 50
  parallel_processing: true
  memory_limit_mb: 1024

# 输出配置
output:
  formats:
    - markdown
    - html
    - pdf
  default_format: "markdown"
  include_charts: true
  include_summary: true
  include_details: true

# 监控配置
monitoring:
  enabled: true
  metrics:
    - processing_time
    - success_rate
    - error_rate
    - resource_usage
  alerts:
    enabled: true
    email_notifications: false
    slack_notifications: false
