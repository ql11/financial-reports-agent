# 财报分析系统主配置
version: 2.0.0
system_name: "Financial Reports Analysis System"
description: "基于agent架构的财报分析系统，深度分析上市公司财务报告，挖掘问题，识别财务风险和投资机会"

# 系统设置
settings:
  language: "zh-CN"
  timezone: "Asia/Shanghai"
  log_level: "INFO"
  max_concurrent_tasks: 5
  cache_enabled: true
  cache_ttl: 3600  # 1小时

# 分析维度配置（基于role.md）
analysis_dimensions:
  # 核心财务指标
  core_financial_indicators:
    profitability:  # 盈利能力
      - gross_margin: "毛利率"
      - net_margin: "净利率"
      - roe: "净资产收益率"
      - roa: "总资产收益率"
    solvency:  # 偿债能力
      - debt_ratio: "资产负债率"
      - current_ratio: "流动比率"
      - quick_ratio: "速动比率"
    operation:  # 运营能力
      - inventory_turnover: "存货周转率"
      - receivables_turnover: "应收账款周转率"
      - total_asset_turnover: "总资产周转率"
    growth:  # 成长能力
      - revenue_growth: "营收增长率"
      - profit_growth: "净利润增长率"
  
  # 三大报表分析
  financial_statements:
    - balance_sheet: "资产负债表"
    - income_statement: "利润表"
    - cash_flow_statement: "现金流量表"
  
  # 趋势与对比
  trend_comparison:
    multi_year_trend: true  # 多年数据趋势分析
    industry_comparison: true  # 与行业均值对比
    peer_comparison: false  # 与同行公司对比
    seasonal_analysis: true  # 季节性分析
  
  # 风险识别
  risk_identification:
    financial_risk_signals: true  # 财务风险信号
    operational_risk_hints: true  # 经营风险提示
    potential_problem_warnings: true  # 潜在问题预警
    fraud_detection: true  # 财报造假方法识别
  
  # 输出格式
  output_format:
    - executive_summary: "执行摘要（核心结论）"
    - key_indicators_table: "关键指标一览表"
    - detailed_analysis: "详细分析（按分析维度）"
    - risk_warnings: "风险提示"
    - comprehensive_score: "综合评分（1-10分）"

# 目录配置
directories:
  inputs: "./inputs"
  outputs: "./outputs"
  data: "./data"
  logs: "./logs"
  reports: "./reports"
  temp: "./temp"

# Agent配置
agents:
  financial_analysis:
    enabled: true
    config_file: "./agents/financial_analysis/agent.yaml"
    skills:
      - pdf_processing
      - data_analysis
      - risk_detection
      - report_writing
  
  data_extraction:
    enabled: true
    config_file: "./agents/data_extraction/agent.yaml"
    skills:
      - pdf_processing
  
  risk_assessment:
    enabled: true
    config_file: "./agents/risk_assessment/agent.yaml"
    skills:
      - risk_detection
      - data_analysis
  
  report_generation:
    enabled: true
    config_file: "./agents/report_generation/agent.yaml"
    skills:
      - report_writing
      - data_analysis

# 技能配置
skills:
  pdf_processing:
    enabled: true
    config_file: "./skills/pdf_processing/skill.yaml"
    dependencies:
      - pdfplumber>=0.10.3
      - camelot-py>=0.11.0
      - pandas>=2.0.0
  
  data_analysis:
    enabled: true
    config_file: "./skills/data_analysis/skill.yaml"
    dependencies:
      - pandas>=2.0.0
      - numpy>=1.24.0
      - scipy>=1.10.0
  
  risk_detection:
    enabled: true
    config_file: "./skills/risk_detection/skill.yaml"
    dependencies:
      - pandas>=2.0.0
      - numpy>=1.24.0
  
  report_writing:
    enabled: true
    config_file: "./skills/report_writing/skill.yaml"
    dependencies:
      - jinja2>=3.1.0
      - matplotlib>=3.7.0
      - plotly>=5.15.0

# 工作流配置
workflows:
  full_analysis:
    name: "完整财报分析"
    description: "完整的财报分析流程"
    steps:
      - step: "数据提取"
        agent: "data_extraction"
        inputs:
          - pdf_file
        outputs:
          - extracted_data
      
      - step: "数据分析"
        agent: "financial_analysis"
        inputs:
          - extracted_data
        outputs:
          - indicators
          - trend_analysis
      
      - step: "风险评估"
        agent: "risk_assessment"
        inputs:
          - indicators
        outputs:
          - risk_assessment
      
      - step: "报告生成"
        agent: "report_generation"
        inputs:
          - indicators
          - risk_assessment
          - trend_analysis
        outputs:
          - report
  
  quick_analysis:
    name: "快速分析"
    description: "快速财报分析流程"
    steps:
      - step: "数据提取和分析"
        agent: "financial_analysis"
        inputs:
          - pdf_file
        outputs:
          - indicators
          - risk_assessment
          - report
  
  role_based_analysis:
    name: "基于role.md的完整分析"
    description: "按照role.md定义的分析维度和输出格式进行完整财报分析"
    config_file: "./workflows/role_based_analysis.yaml"

# 性能配置
performance:
  timeout_seconds: 300
  max_file_size_mb: 50
  parallel_processing: true
  memory_limit_mb: 1024

# 输出配置
output:
  formats:
    - markdown
    - html
    - pdf
  default_format: "markdown"
  include_charts: true
  include_summary: true
  include_details: true

# 监控配置
monitoring:
  enabled: true
  metrics:
    - processing_time
    - success_rate
    - error_rate
    - resource_usage
  alerts:
    enabled: true
    email_notifications: false
    slack_notifications: false
