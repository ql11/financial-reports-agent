# 财报分析阈值配置

# 盈利能力阈值
profitability:
  gross_margin:
    warning: 10.0    # 毛利率低于10%警告
    critical: 5.0    # 毛利率低于5%严重警告
    excellent: 30.0  # 毛利率高于30%优秀
  
  net_margin:
    warning: 3.0     # 净利率低于3%警告
    critical: 1.0    # 净利率低于1%严重警告
    excellent: 15.0  # 净利率高于15%优秀
  
  roe:
    warning: 5.0     # ROE低于5%警告
    critical: 2.0    # ROE低于2%严重警告
    excellent: 15.0  # ROE高于15%优秀
  
  roa:
    warning: 3.0     # ROA低于3%警告
    critical: 1.0    # ROA低于1%严重警告
    excellent: 8.0   # ROA高于8%优秀

# 偿债能力阈值
solvency:
  debt_ratio:
    warning: 70.0    # 资产负债率高于70%警告
    critical: 85.0   # 资产负债率高于85%严重警告
    excellent: 50.0  # 资产负债率低于50%优秀
  
  current_ratio:
    warning: 1.0     # 流动比率低于1警告
    critical: 0.8    # 流动比率低于0.8严重警告
    excellent: 2.0   # 流动比率高于2优秀
  
  quick_ratio:
    warning: 0.5     # 速动比率低于0.5警告
    critical: 0.3    # 速动比率低于0.3严重警告
    excellent: 1.0   # 速动比率高于1优秀

# 运营能力阈值
operation:
  inventory_turnover:
    warning: 2.0     # 存货周转率低于2警告
    critical: 1.0    # 存货周转率低于1严重警告
    excellent: 5.0   # 存货周转率高于5优秀
  
  receivables_turnover:
    warning: 3.0     # 应收账款周转率低于3警告
    critical: 1.5    # 应收账款周转率低于1.5严重警告
    excellent: 8.0   # 应收账款周转率高于8优秀
  
  total_asset_turnover:
    warning: 0.3     # 总资产周转率低于0.3警告
    critical: 0.1    # 总资产周转率低于0.1严重警告
    excellent: 0.8   # 总资产周转率高于0.8优秀

# 成长能力阈值
growth:
  revenue_growth:
    warning: -10.0   # 收入增长低于-10%警告
    critical: -20.0  # 收入增长低于-20%严重警告
    excellent: 20.0  # 收入增长高于20%优秀
  
  profit_growth:
    warning: -20.0   # 利润增长低于-20%警告
    critical: -40.0  # 利润增长低于-40%严重警告
    excellent: 30.0  # 利润增长高于30%优秀
  
  cash_flow_growth:
    warning: -30.0   # 现金流增长低于-30%警告
    critical: -50.0  # 现金流增长低于-50%严重警告
    excellent: 20.0  # 现金流增长高于20%优秀

# 造假检测阈值
fraud_detection:
  # 业绩背离阈值
  revenue_profit_divergence:
    revenue_decline: -5.0    # 收入下降超过5%
    profit_growth: 5.0       # 利润增长超过5%
    score: 2.5               # 风险评分
  
  # 现金流背离阈值
  cash_flow_divergence:
    profit_growth: 5.0       # 利润增长超过5%
    cash_flow_decline: -20.0 # 现金流下降超过20%
    score: 3.0               # 风险评分
    cash_flow_negative_score: 2.0  # 经营活动现金流为负评分
  
  # 应收账款异常阈值
  receivables_anomalies:
    growth_exceed_revenue: 10.0  # 应收账款增长率超过收入增长率10个百分点
    score: 2.0                   # 风险评分
    bad_debt_provision_score: 2.5 # 坏账准备减少评分
  
  # 存货异常阈值
  inventory_anomalies:
    growth_exceed_revenue: 15.0  # 存货增长率超过收入增长率15个百分点
    score: 2.0                   # 风险评分
    inventory_provision_score: 2.5 # 存货跌价准备减少评分

  subsidy_manipulation:
    government_subsidies_score: 1.5  # 政府补助异常增长评分
    deferred_income_score: 2.0       # 递延收益摊销异常评分
    government_subsidies_profit_ratio_warning: 0.1  # 政府补助占净利润10%以上才触发
    deferred_income_profit_ratio_warning: 0.1       # 递延收益占净利润10%以上才触发
  
  # 关联交易阈值
  related_party_transactions:
    percentage_threshold: 20.0   # 关联交易比例超过20%
    score: 2.0                   # 风险评分

  # 收入质量阈值
  cash_revenue_ratio:
    warning: 0.8                # 销售收现比低于80%预警
    score: 2.5                  # 风险评分

  receivable_ratio:
    warning: 0.5                # 应收账款占收入比高于50%预警
    score: 2.5                  # 风险评分

  cash_profit_ratio:
    warning: 0.5                # 经营现金流/净利润低于0.5预警
    score: 3.0                  # 风险评分

  receivables_growth_vs_revenue:
    spread: 10.0                # 应收增速超过收入增速10个百分点
    warning: 20.0               # 且应收自身增速高于20%

  inventory_growth_vs_revenue:
    spread: 15.0                # 存货增速超过收入增速15个百分点
    warning: 20.0               # 且存货自身增速高于20%

  capacity_anomalies:
    total_asset_turnover_warning: 0.5  # 总资产周转率低于0.5预警
    score: 1.5                         # 风险评分

  asset_overstatement:
    construction_in_progress_stagnant_score: 2.5  # 在建工程长期不转固评分
    total_asset_turnover_warning: 0.5             # 总资产周转率低于0.5预警
    asset_growth_warning: 10.0                    # 资产增速高于10%预警
    revenue_growth_ceiling: 5.0                  # 收入增速低于5%视为未同步增长
    goodwill_insufficient_impairment_score: 2.5  # 商誉减值不足评分
    score: 2.0                                   # 产能与资产不匹配评分

  cross_statement_inconsistency:
    cash_profit_ratio_warning: 0.5        # 经营现金流/净利润低于0.5预警
    cash_profit_ratio_score: 3.0          # 现金流与利润背离评分
    profit_positive_cash_negative_score: 3.0  # 净利润为正但经营现金流为负评分
    check_failed_score: 3.0               # 勾稽校验失败评分

  cash_flow_quality:
    free_cash_flow_negative_score: 2.5        # 自由现金流为负评分
    cash_balance_interest_mismatch_score: 2.5 # 现金余额与利息收入不匹配评分

  expense_capitalization:
    rd_capitalization_ratio_warning: 0.5      # 研发资本化率高于50%预警
    rd_capitalization_ratio_score: 2.5        # 研发资本化比例异常评分
    depreciation_policy_change_score: 2.0     # 折旧政策变更评分

  liability_concealment:
    contingent_liabilities_score: 2.0         # 或有事项披露不足评分
    off_balance_sheet_items_score: 2.0        # 表外融资嫌疑评分

  accounting_estimate_changes:
    accounting_estimate_changes_score: 2.0    # 会计估计变更评分
    bad_debt_ratio_decreased_score: 2.5       # 坏账准备计提比例下降评分

  auditor_change:
    auditor_change_score: 2.5                 # 审计师变更评分
    audit_fee_abnormal_score: 1.5             # 审计费用异常波动评分

  accounting_changes:
    accounting_policy_changes_score: 1.0      # 会计政策变更评分

  audit_issues:
    non_standard_opinion_score: 3.0           # 非标准审计意见评分

  historical_violations:
    score: 2.5                                # 历史违规评分

# 风险等级阈值
risk_levels:
  critical: 30.0  # 极高风险阈值
  high: 20.0      # 高风险阈值
  medium: 10.0    # 中等风险阈值
  low: 0.0        # 低风险阈值
