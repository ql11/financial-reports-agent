# 基于role.md的财报分析配置
version: 2.0.0
name: "role_based_financial_analysis"
description: "基于role.md要求的财报分析系统配置"

# 交互原则配置
interaction_principles:
  data_first: true  # 数据优先，用数据说话
  explain_complex_concepts: true  # 复杂概念用通俗语言解释
  distinguish_analysis_types: true  # 区分确定分析与推测性分析
  ask_for_clarification: true  # 主动提问澄清分析需求

# 分析维度配置
analysis_dimensions:
  # 1. 核心财务指标
  core_financial_indicators:
    enabled: true
    indicators:
      # 盈利能力
      profitability:
        - name: "毛利率"
          formula: "(营业收入 - 营业成本) / 营业收入"
          threshold:
            good: ">30%"
            warning: "15%-30%"
            critical: "<15%"
        
        - name: "净利率"
          formula: "净利润 / 营业收入"
          threshold:
            good: ">10%"
            warning: "5%-10%"
            critical: "<5%"
        
        - name: "净资产收益率(ROE)"
          formula: "净利润 / 平均净资产"
          threshold:
            good: ">15%"
            warning: "8%-15%"
            critical: "<8%"
        
        - name: "总资产收益率(ROA)"
          formula: "净利润 / 平均总资产"
          threshold:
            good: ">8%"
            warning: "4%-8%"
            critical: "<4%"
      
      # 偿债能力
      solvency:
        - name: "资产负债率"
          formula: "总负债 / 总资产"
          threshold:
            good: "<50%"
            warning: "50%-70%"
            critical: ">70%"
        
        - name: "流动比率"
          formula: "流动资产 / 流动负债"
          threshold:
            good: ">2.0"
            warning: "1.0-2.0"
            critical: "<1.0"
        
        - name: "速动比率"
          formula: "(流动资产 - 存货) / 流动负债"
          threshold:
            good: ">1.0"
            warning: "0.5-1.0"
            critical: "<0.5"
      
      # 运营能力
      operation:
        - name: "存货周转率"
          formula: "营业成本 / 平均存货"
          threshold:
            good: ">行业平均"
            warning: "接近行业平均"
            critical: "<行业平均"
        
        - name: "应收账款周转率"
          formula: "营业收入 / 平均应收账款"
          threshold:
            good: ">行业平均"
            warning: "接近行业平均"
            critical: "<行业平均"
        
        - name: "总资产周转率"
          formula: "营业收入 / 平均总资产"
          threshold:
            good: ">行业平均"
            warning: "接近行业平均"
            critical: "<行业平均"
      
      # 成长能力
      growth:
        - name: "营收增长率"
          formula: "(本期营业收入 - 上期营业收入) / 上期营业收入"
          threshold:
            good: ">15%"
            warning: "5%-15%"
            critical: "<5%"
        
        - name: "净利润增长率"
          formula: "(本期净利润 - 上期净利润) / 上期净利润"
          threshold:
            good: ">10%"
            warning: "0%-10%"
            critical: "<0%"
  
  # 2. 三大报表分析
  financial_statements:
    enabled: true
    statements:
      - name: "资产负债表"
        analysis_focus:
          - "资产结构分析"
          - "负债水平分析"
          - "股东权益分析"
          - "资产质量评估"
          - "负债结构评估"
      
      - name: "利润表"
        analysis_focus:
          - "收入质量分析"
          - "成本结构分析"
          - "费用控制分析"
          - "盈利能力分析"
          - "利润质量评估"
      
      - name: "现金流量表"
        analysis_focus:
          - "经营现金流分析"
          - "投资现金流分析"
          - "筹资现金流分析"
          - "自由现金流分析"
          - "现金储备分析"
  
  # 3. 趋势与对比
  trend_comparison:
    enabled: true
    analysis_types:
      multi_year_trend:
        enabled: true
        years: 5  # 分析最近5年数据
        metrics:
          - "营业收入"
          - "净利润"
          - "总资产"
          - "净资产"
          - "现金流"
      
      industry_comparison:
        enabled: true
        data_source: "行业数据库"
        comparison_metrics:
          - "毛利率"
          - "净利率"
          - "ROE"
          - "资产负债率"
          - "流动比率"
      
      peer_comparison:
        enabled: false  # 默认关闭，需要额外数据
        peer_companies: 5  # 对比前5家同行公司
      
      seasonal_analysis:
        enabled: true
        applicable_industries:
          - "零售"
          - "旅游"
          - "农业"
          - "能源"
  
  # 4. 风险识别
  risk_identification:
    enabled: true
    risk_types:
      financial_risk_signals:
        enabled: true
        signals:
          - "资产负债率过高"
          - "流动比率过低"
          - "应收账款周转率下降"
          - "存货周转率下降"
          - "现金流为负"
          - "利息保障倍数过低"
      
      operational_risk_hints:
        enabled: true
        hints:
          - "主营业务收入下降"
          - "毛利率持续下滑"
          - "期间费用率上升"
          - "资产减值损失增加"
          - "关联交易异常"
      
      potential_problem_warnings:
        enabled: true
        warnings:
          - "会计政策变更"
          - "审计意见非标"
          - "重大诉讼"
          - "监管处罚"
          - "高管频繁变动"
      
      fraud_detection:
        enabled: true
        detection_methods:
          - "财务指标异常分析"
          - "报表勾稽关系检查"
          - "现金流与利润匹配分析"
          - "关联方交易分析"
          - "会计估计变更分析"
        fraud_patterns:
          - "收入虚增"
          - "成本费用虚减"
          - "资产虚增"
          - "负债隐瞒"
          - "现金流操纵"
  
  # 5. 输出格式
  output_format:
    enabled: true
    sections:
      - section: "执行摘要"
        required: true
        content:
          - "核心结论"
          - "关键发现"
          - "主要建议"
      
      - section: "关键指标一览表"
        required: true
        format: "表格"
        indicators: "所有核心财务指标"
      
      - section: "详细分析"
        required: true
        subsections:
          - "盈利能力分析"
          - "偿债能力分析"
          - "运营能力分析"
          - "成长能力分析"
          - "资产负债表分析"
          - "利润表分析"
          - "现金流量表分析"
          - "趋势分析"
          - "行业对比分析"
      
      - section: "风险提示"
        required: true
        content:
          - "财务风险"
          - "经营风险"
          - "潜在问题"
          - "造假风险"
      
      - section: "综合评分"
        required: true
        scale: "1-10分"
        criteria:
          - "财务健康度"
          - "成长性"
          - "风险水平"
          - "透明度"
      
      - section: "财报造假分析"
        required: true
        when: "fraud_detection.enabled = true"
        content:
          - "造假指标分析"
          - "造假方法识别"
          - "造假逻辑分析"
          - "风险评分"
      
      - section: "投资建议"
        required: false
        content:
          - "投资评级"
          - "目标价格"
          - "风险提示"
          - "操作建议"

# 报告模板配置
report_templates:
  standard:
    name: "标准财报分析报告"
    format: "markdown"
    sections: "按output_format.sections配置"
  
  detailed:
    name: "详细财报分析报告"
    format: "html"
    sections: "包含所有分析维度"
    include_visualizations: true
  
  executive:
    name: "执行摘要报告"
    format: "pdf"
    sections: ["执行摘要", "关键指标", "风险提示", "综合评分"]
    length: "1-2页"

# 数据源配置
data_sources:
  industry_data:
    source: "行业数据库"
    update_frequency: "季度"
    metrics: ["行业平均值", "行业中位数", "行业标准差"]
  
  peer_data:
    source: "上市公司数据库"
    update_frequency: "年度"
    selection_criteria: ["同行业", "同规模", "同地区"]
  
  historical_data:
    source: "公司历史财报"
    years: 5
    frequency: "年度"

# 质量保证配置
quality_assurance:
  data_validation:
    enabled: true
    checks:
      - "数据完整性检查"
      - "数据一致性检查"
      - "异常值检测"
      - "逻辑关系验证"
  
  analysis_validation:
    enabled: true
    checks:
      - "指标计算验证"
      - "趋势分析验证"
      - "对比分析验证"
      - "风险识别验证"
  
  report_validation:
    enabled: true
    checks:
      - "格式规范检查"
      - "内容完整性检查"
      - "逻辑一致性检查"
      - "数据准确性检查"

# 性能优化配置
performance:
  parallel_processing: true
  max_concurrent_analyses: 3
  cache_enabled: true
  cache_ttl: 3600  # 1小时
  timeout_seconds: 600  # 10分钟

# 监控和日志配置
monitoring:
  enabled: true
  metrics_tracking:
    - "分析时间"
    - "数据质量"
    - "分析准确性"
    - "用户满意度"
  
  alerting:
    enabled: true
    thresholds:
      analysis_time: 300  # 5分钟
      error_rate: 0.05  # 5%
      data_quality: 0.8  # 80%