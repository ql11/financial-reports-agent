# 风险权重配置

# 造假模式权重
fraud_pattern_weights:
  revenue_profit_divergence: 1.3    # 业绩背离权重
  cash_flow_divergence: 1.5         # 现金流背离权重
  cash_flow_quality: 1.4            # 现金流质量权重
  receivables_anomalies: 1.0        # 应收账款异常权重
  inventory_anomalies: 1.0          # 存货异常权重
  fictitious_revenue: 1.4           # 虚构收入权重
  subsidy_manipulation: 0.8         # 政府补助操纵权重
  capacity_anomalies: 0.7           # 产能异常权重
  related_party_issues: 1.3         # 关联交易问题权重
  accounting_changes: 0.6           # 会计政策变更权重
  accounting_estimates: 0.7         # 会计估计变更权重
  audit_issues: 2.0                 # 审计问题权重
  auditor_change: 1.8               # 审计师变更权重
  historical_violations: 1.8        # 历史违规权重
  expense_capitalization: 1.2       # 费用资本化权重
  asset_overstate: 1.2              # 资产高估权重
  liability_conceal: 1.3            # 负债隐瞒权重
  cross_statement_inconsistency: 1.6  # 报表勾稽权重

# 风险等级基础分
risk_level_base_scores:
  critical: 8.0
  high: 4.5
  medium: 1.5
  low: 0.3

# 不同最高风险等级的额外加分
max_risk_bonus:
  critical: 5.0
  high: 2.0
  medium: 0.0
  low: 0.0

# 评分维度参数
density_rules:
  power: 1.5
  scale: 8.0
  critical_density: 0.6
  critical_score_floor: 30.0

breadth_rules:
  per_pattern: 0.5
  max_score: 5.0

concentration_rules:
  power: 1.3
  scale: 4.0

# 财务严重度加分
financial_severity:
  net_profit_negative: 3.0
  loss_ratio_over_5pct: 1.5
  revenue_growth_below_negative_20: 2.0
  revenue_growth_below_negative_10: 1.0
  operating_cash_flow_negative: 2.5
  debt_ratio_above_70: 1.5
  debt_ratio_above_60: 0.5

# 关键模式抬升规则
critical_pattern_rules:
  critical_min_score: 35.0
  critical_min_density: 0.5
  high_floor_for_critical_pattern: true

# 风险等级分段阈值
risk_level_thresholds:
  critical: 38.0
  high: 25.0
  medium: 14.0

# 评分上限
score_caps:
  total: 50.0

# 风险指标权重
risk_indicator_weights:
  # 盈利能力指标权重
  gross_margin: 1.0
  net_margin: 1.2
  roe: 1.5
  roa: 1.3
  
  # 偿债能力指标权重
  debt_ratio: 1.4
  current_ratio: 1.1
  quick_ratio: 1.2
  
  # 运营能力指标权重
  inventory_turnover: 0.9
  receivables_turnover: 1.0
  total_asset_turnover: 0.8
  
  # 成长能力指标权重
  revenue_growth: 1.2
  profit_growth: 1.5
  cash_flow_growth: 1.3

# 行业调整权重
industry_adjustments:
  # 不同行业的风险权重调整
  manufacturing:  # 制造业
    inventory_turnover: 1.2
    receivables_turnover: 1.1
    total_asset_turnover: 0.9
  
  technology:  # 科技行业
    gross_margin: 1.3
    net_margin: 1.4
    revenue_growth: 1.5
  
  retail:  # 零售业
    inventory_turnover: 1.4
    gross_margin: 0.8
    current_ratio: 1.2
  
  real_estate:  # 房地产
    debt_ratio: 1.6
    current_ratio: 1.3
    quick_ratio: 1.2

# 公司规模调整权重
size_adjustments:
  large_cap:  # 大盘股
    revenue_growth: 0.8
    profit_growth: 0.9
    volatility: 0.7
  
  mid_cap:  # 中盘股
    revenue_growth: 1.0
    profit_growth: 1.0
    volatility: 1.0
  
  small_cap:  # 小盘股
    revenue_growth: 1.3
    profit_growth: 1.4
    volatility: 1.5

# 时间权重
time_weights:
  # 不同时间段的权重
  current_year: 1.0      # 当前年度
  previous_year: 0.8     # 上一年度
  two_years_ago: 0.6     # 两年前
  three_years_ago: 0.4   # 三年前
  older: 0.2             # 更早

# 审计意见权重
audit_opinion_weights:
  standard_unqualified: 1.0      # 标准无保留意见
  unqualified: 1.0              # 无保留意见
  qualified: 1.5                # 保留意见
  adverse: 2.0                  # 否定意见
  disclaimer: 2.5               # 无法表示意见
  unqualified_with_emphasis: 1.2  # 带强调事项段的无保留意见
  unqualified_with_other: 1.2    # 带其他事项段的无保留意见

# 历史违规权重
historical_violation_weights:
  warning: 1.2        # 警告
  criticism: 1.5      # 批评
  fine: 2.0           # 罚款
  suspension: 2.5     # 暂停
  delisting: 3.0      # 退市

# 综合风险权重
composite_weights:
  financial_ratios: 0.3          # 财务比率权重
  growth_trends: 0.25            # 成长趋势权重
  fraud_patterns: 0.35           # 造假模式权重
  external_factors: 0.1          # 外部因素权重
