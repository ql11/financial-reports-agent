name: report_writing
version: 2.0.0
description: 财务分析报告生成技能，支持role.md定义的输出格式
author: Financial Reports Team

capabilities:
  - report_generation: 生成财务分析报告（按role.md标准格式）
  - template_rendering: 模板渲染
  - data_visualization: 数据可视化
  - executive_summary: 生成执行摘要（核心结论）
  - key_indicators_table: 生成关键指标一览表
  - detailed_analysis: 生成详细分析（按分析维度）
  - risk_warnings: 生成风险提示
  - comprehensive_scoring: 生成综合评分（1-10分）
  - fraud_analysis_report: 生成财报造假分析报告
  - investment_recommendations: 生成投资建议

inputs:
  - financial_data: 财务数据
  - indicators: 财务指标
  - risk_analysis: 风险分析结果
  - trend_analysis: 趋势分析结果
  - company_info: 公司信息
  - report_template: 报告模板（可选）

outputs:
  - report_content: 报告内容
  - report_format: 报告格式（markdown, html, pdf）
  - visualizations: 可视化图表
  - summary: 执行摘要
  - recommendations: 详细建议

parameters:
  report_format: markdown
  include_charts: true
  language: zh-CN
  detail_level: detailed
  template: standard_financial_report

dependencies:
  - jinja2>=3.1.0
  - matplotlib>=3.7.0
  - plotly>=5.15.0
  - markdown>=3.4.0

examples:
  - description: 生成Markdown格式报告
    input:
      financial_data: {...}
      indicators: {...}
      risk_analysis: {...}
      company_info:
        name: "英洛华科技股份有限公司"
        year: 2025
    output:
      report_content: "# 英洛华科技股份有限公司2025年度财务分析报告\n\n## 一、执行摘要\n\n..."
      report_format: "markdown"
      summary: "财务状况良好，建议关注风险点并持续优化"

  - description: 生成HTML格式报告
    input:
      financial_data: {...}
      indicators: {...}
      risk_analysis: {...}
      report_format: "html"
    output:
      report_content: "<html><head><title>财务分析报告</title></head><body>..."
      report_format: "html"
      visualizations: [...]
