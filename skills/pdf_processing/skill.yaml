name: pdf_processing
version: 1.0.0
description: PDF文件处理和财务数据提取技能
author: Financial Reports Team

capabilities:
  - pdf_extraction: 从PDF文件中提取文本和表格数据
  - table_detection: 检测和解析PDF中的表格
  - financial_data_extraction: 提取财务报表数据（资产负债表、利润表、现金流量表）
  - data_validation: 验证提取数据的完整性和准确性

inputs:
  - pdf_file: PDF文件路径
  - extraction_mode: 提取模式（full, tables_only, text_only）
  - page_range: 页码范围（可选）

outputs:
  - extracted_text: 提取的文本内容
  - tables_data: 提取的表格数据（JSON格式）
  - financial_data: 结构化财务数据
  - metadata: 文件元数据

parameters:
  quality_threshold: 0.8
  max_pages: 200
  table_detection_algorithm: camelot
  language: zh-CN

dependencies:
  - pdfplumber>=0.10.3
  - camelot-py>=0.11.0
  - pandas>=2.0.0
  - numpy>=1.24.0

examples:
  - description: 提取PDF中的财务报表
    input:
      pdf_file: "source/英洛华_2025_年报.pdf"
      extraction_mode: "full"
    output:
      financial_data:
        balance_sheet: {...}
        income_statement: {...}
        cash_flow_statement: {...}

  - description: 仅提取表格数据
    input:
      pdf_file: "source/英洛华_2025_年报.pdf"
      extraction_mode: "tables_only"
    output:
      tables_data: [...]
